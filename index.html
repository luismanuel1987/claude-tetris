<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <button id="theme-toggle" class="theme-toggle">
      <span class="toggle-icon">&#9790;</span>
      <span class="toggle-label">LIGHT</span>
    </button>
    <h1 class="game-title">TETRIS</h1>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title"></p>
        <p id="overlay-score"></p>

        <div id="name-section" class="hidden">
          <p class="new-record-label">★ NUEVO RÉCORD ★</p>
          <div class="name-row">
            <input id="player-name" type="text" maxlength="12" placeholder="Tu nombre..." autocomplete="off" spellcheck="false" />
            <button id="save-btn">OK</button>
          </div>
        </div>

        <div id="records-section">
          <table class="records-table">
            <thead>
              <tr><th>#</th><th>Nombre</th><th>Score</th><th>Líneas</th><th>Combo</th></tr>
            </thead>
            <tbody id="records-body"></tbody>
          </table>
          <button id="reset-btn" class="reset-btn">Borrar récords</button>
        </div>

        <button id="restart-btn">JUGAR</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
