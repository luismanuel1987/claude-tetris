<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <button id="theme-toggle" class="theme-toggle">
      <span class="toggle-icon">&#9790;</span>
      <span class="toggle-label">LIGHT</span>
    </button>
    <h1 class="game-title">TETRIS</h1>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>
        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>

    <div id="pause-menu" class="overlay hidden">
      <div class="pause-box">
        <p class="pause-title">PAUSA</p>
        <div class="pause-actions">
          <button id="resume-btn" class="pause-btn primary">Reanudar</button>
          <button id="restart-pause-btn" class="pause-btn">Reiniciar</button>
          <button id="controls-btn" class="pause-btn">Ver controles</button>
        </div>
        <div class="pause-level">
          <span class="label">NIVEL INICIAL</span>
          <div class="level-selector">
            <button id="level-dec" class="level-btn">&#8722;</button>
            <span id="start-level-display">1</span>
            <button id="level-inc" class="level-btn">+</button>
          </div>
        </div>
        <div id="controls-list" class="controls-panel hidden">
          <ul>
            <li><kbd>&#8592;</kbd><kbd>&#8594;</kbd> mover</li>
            <li><kbd>&#8593;</kbd> / <kbd>X</kbd> rotar</li>
            <li><kbd>&#8595;</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> / <kbd>Esc</kbd> pausa</li>
          </ul>
        </div>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
